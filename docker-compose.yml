services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ledger-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ledger_engine
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_PREFIX: ledger-engine
      WEBHOOK_MAX_ATTEMPTS: 5
      WEBHOOK_BACKOFF_MS: 5000
      OUTBOX_POLL_INTERVAL_MS: 5000
      OUTBOX_BATCH_SIZE: 20
      OUTBOX_BACKOFF_MS: 5000
      OUTBOX_MAX_ATTEMPTS: 5
      OUTBOX_STALE_AFTER_MS: 30000
      RECONCILIATION_INTERVAL_MS: 60000
    ports:
      - '3000:3000'

  postgres:
    image: postgres:16-alpine
    container_name: ledger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ledger_engine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ledger_engine']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ledger-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
